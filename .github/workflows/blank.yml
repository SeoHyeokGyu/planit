name: Discord Issue Notifier

on:
  workflow_dispatch:  # 프로젝트 종료로 자동 트리거 비활성화 (수동 실행만 가능)

jobs:
  notify:
    if: false  # 프로젝트 종료로 비활성화
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          ACTION="${{ github.event.action }}"
          ISSUE_NUM="${{ github.event.issue.number }}"
          TITLE="${{ github.event.issue.title }}"
          URL="${{ github.event.issue.html_url }}"
          USER="${{ github.event.sender.login }}"
          REPO="${{ github.repository }}"
          
          # 액션별 이모지와 색상 설정
          case $ACTION in
            "opened")
              EMOJI="🚨"
              MSG="새 이슈 생성"
              COLOR=15158332
              ;;
            "closed")
              EMOJI="✅"
              MSG="이슈 해결"
              COLOR=3066993
              ;;
            "reopened")
              EMOJI="🔄"
              MSG="이슈 재개"
              COLOR=15105570
              ;;
            "assigned")
              EMOJI="👤"
              MSG="담당자 지정"
              ASSIGNEE="${{ github.event.assignee.login }}"
              COLOR=5763719
              ;;
            "unassigned")
              EMOJI="👤"
              MSG="담당자 해제"
              COLOR=9807270
              ;;
            "labeled")
              LABEL="${{ github.event.label.name }}"
              EMOJI="🏷️"
              MSG="라벨 추가: $LABEL"
              COLOR=3447003
              ;;
            "unlabeled")
              LABEL="${{ github.event.label.name }}"
              EMOJI="🏷️"
              MSG="라벨 제거: $LABEL"
              COLOR=10070709
              ;;
            "edited")
              EMOJI="✏️"
              MSG="이슈 수정"
              COLOR=16776960
              ;;
            "deleted")
              EMOJI="🗑️"
              MSG="이슈 삭제"
              COLOR=8421504
              ;;
            "milestoned")
              MILESTONE="${{ github.event.milestone.title }}"
              EMOJI="🎯"
              MSG="마일스톤 설정: $MILESTONE"
              COLOR=5793266
              ;;
            "demilestoned")
              EMOJI="🎯"
              MSG="마일스톤 해제"
              COLOR=10070709
              ;;
            "locked")
              EMOJI="🔒"
              MSG="이슈 잠금"
              COLOR=7506394
              ;;
            "unlocked")
              EMOJI="🔓"
              MSG="이슈 잠금 해제"
              COLOR=1752220
              ;;
            *)
              EMOJI="📌"
              MSG="이슈 업데이트"
              COLOR=3447003
              ;;
          esac
          
          echo "Sending notification: $MSG for issue #$ISSUE_NUM"
          
          # Discord 전송
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"username\": \"GitHub Issues\",
              \"avatar_url\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\",
              \"embeds\": [{
                \"title\": \"$EMOJI $MSG #$ISSUE_NUM\",
                \"description\": \"**$TITLE**\",
                \"url\": \"$URL\",
                \"color\": $COLOR,
                \"fields\": [
                  {
                    \"name\": \"📁 저장소\",
                    \"value\": \"$REPO\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"👤 작업자\",
                    \"value\": \"$USER\",
                    \"inline\": true
                  }
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"
          
          if [ $? -eq 0 ]; then
            echo "✅ Notification sent successfully!"
          else
            echo "❌ Failed to send notification"
            exit 1
          fi
